name: Fetch & Summarize Framework News

on:
  schedule:
    # 毎朝8時 (JST) = UTC 23時 (前日)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write  # data/articles.json と docs/ をコミットするため

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic feedparser requests beautifulsoup4

      - name: Fetch, summarize, and update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python scripts/fetch_and_summarize.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          # 変更がなければコミットしない
          git diff --cached --quiet || git commit -m "chore: update articles $(date +'%Y-%m-%d')"
          git push
